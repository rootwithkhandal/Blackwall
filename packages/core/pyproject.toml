[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "blackwall"
version = "2.1.0"
description = "Core firewall engine with ML anomaly detection, blockchain logging, and SIEM forwarding."
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "scapy>=2.6.0",
    "cryptography>=42.0.0",
    "scikit-learn>=1.4.0",
    "scipy>=1.12.0",
    "requests>=2.32.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
]
